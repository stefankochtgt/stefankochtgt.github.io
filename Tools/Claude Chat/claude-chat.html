<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat — TEGRITY</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      color: #2d2d2d;
      background: #f5f7fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      background: #2d2d2d;
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 3px solid #007bff;
      flex-shrink: 0;
    }
    .toolbar-brand { font-size: 11px; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; }
    .toolbar h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.01em; }
    .btn-new {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 3px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-new:hover { border-color: #007bff; color: #fff; }

    /* ─── API KEY BAR ─── */
    .key-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .key-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
                 letter-spacing: 0.08em; color: #777; white-space: nowrap; }
    .key-bar input {
      flex: 1; min-width: 180px;
      border: 1px solid #ccc; border-radius: 3px;
      padding: 6px 10px; font-family: inherit; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .key-bar input:focus { border-color: #007bff; }
    .key-note { font-size: 12px; margin-left: 4px; }
    .btn-sm {
      border: none; border-radius: 3px;
      padding: 6px 14px; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-dark    { background: #2d2d2d; color: #fff; }
    .btn-dark:hover    { background: #444; }
    .btn-outline { background: transparent; border: 1px solid #ccc; color: #555; }
    .btn-outline:hover { background: #f5f5f5; }

    /* ─── CHAT AREA ─── */
    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-block { display: flex; flex-direction: column; gap: 4px; max-width: 820px; }
    .msg-block.user  { align-self: flex-end; align-items: flex-end; }
    .msg-block.claude { align-self: flex-start; align-items: flex-start; }

    .msg-name {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 0 4px;
    }
    .msg-block.user   .msg-name { color: #007bff; }
    .msg-block.claude .msg-name { color: #555; }

    .msg-bubble {
      padding: 11px 16px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 680px;
    }
    .msg-block.user   .msg-bubble { background: #e8f0fe; color: #1a1a1a; }
    .msg-block.claude .msg-bubble { background: #fff; border: 1px solid #e0e0e0; color: #1a1a1a; }

    .thinking {
      font-size: 13px; color: #888; font-style: italic;
      padding: 6px 4px; align-self: flex-start;
    }

    /* ─── INPUT BAR ─── */
    .input-bar {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .input-bar textarea {
      flex: 1;
      border: 1px solid #ccc; border-radius: 3px;
      padding: 9px 12px; font-family: inherit; font-size: 14px;
      color: #2d2d2d; outline: none; resize: none;
      line-height: 1.5; min-height: 44px; max-height: 160px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    .input-bar textarea:focus { border-color: #007bff; }
    .btn-send {
      background: #007bff; color: #fff;
      border: none; border-radius: 3px;
      padding: 10px 22px; font-family: inherit; font-size: 14px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.15s; align-self: flex-end;
    }
    .btn-send:hover:not(:disabled) { background: #0062cc; }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint { font-size: 11px; color: #bbb; align-self: flex-end; padding-bottom: 2px; white-space: nowrap; }
  </style>
</head>
<body>

<div class="toolbar">
  <div>
    <div class="toolbar-brand">TEGRITY Safety Engineering</div>
    <h1>Claude Chat</h1>
  </div>
  <button class="btn-new" onclick="newChat()">New Chat</button>
</div>

<div class="key-bar">
  <span class="key-label">API Key</span>
  <input type="password" id="apikey-input" placeholder="sk-ant-api03-…" autocomplete="off" />
  <button class="btn-sm btn-dark"    onclick="saveApiKey()">Save</button>
  <button class="btn-sm btn-outline" onclick="clearApiKey()">Clear</button>
  <span class="key-note" id="apikey-note"></span>
</div>
<div class="key-bar" style="background:#fafafa;border-bottom-color:#e8e8e8;">
  <span class="key-label">Proxy URL</span>
  <input type="text" id="proxy-input" placeholder="https://my-proxy.yourname.workers.dev  (required — see Tools/proxy/anthropic-proxy.js)" autocomplete="off" style="font-size:12px;" />
  <button class="btn-sm btn-dark"    onclick="saveProxy()">Save</button>
  <button class="btn-sm btn-outline" onclick="clearProxy()">Clear</button>
  <span class="key-note" id="proxy-note"></span>
</div>

<div class="chat-wrap" id="chatWrap"></div>

<div class="input-bar">
  <textarea id="msgInput" placeholder="Type a message…" rows="1"
            oninput="autoResize(this)"
            onkeydown="handleKey(event)"></textarea>
  <span class="hint">Enter&nbsp;to&nbsp;send<br>Shift+Enter&nbsp;newline</span>
  <button class="btn-send" id="btnSend" onclick="sendMessage()">Send</button>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let history = [];   // [{role, content}, ...]
let busy    = false;

// ─── API KEY ──────────────────────────────────────────────────────────────────
function saveApiKey() {
  const key = document.getElementById('apikey-input').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('Please enter a valid Anthropic API key (starts with sk-ant-).');
    return;
  }
  localStorage.setItem('tegrity_chat_apikey', key);
  document.getElementById('apikey-input').value = '';
  refreshKeyNote();
}

function clearApiKey() {
  localStorage.removeItem('tegrity_chat_apikey');
  refreshKeyNote();
}

function refreshKeyNote() {
  const key = localStorage.getItem('tegrity_chat_apikey');
  const el  = document.getElementById('apikey-note');
  if (key) {
    el.style.color = '#2e7d32';
    el.textContent = '✓ Key saved (…' + key.slice(-6) + ')';
  } else {
    el.style.color = '#888';
    el.textContent = 'No key saved — stored only in your browser.';
  }
}

function saveProxy() {
  const url = document.getElementById('proxy-input').value.trim().replace(/\/$/, '');
  if (!url.startsWith('https://')) { alert('Proxy URL must start with https://'); return; }
  localStorage.setItem('tegrity_proxy_url', url);
  document.getElementById('proxy-input').value = '';
  refreshProxyNote();
}
function clearProxy() {
  localStorage.removeItem('tegrity_proxy_url');
  refreshProxyNote();
}
function refreshProxyNote() {
  const url = localStorage.getItem('tegrity_proxy_url');
  const el  = document.getElementById('proxy-note');
  if (url) {
    el.style.color = '#2e7d32';
    el.textContent = '✓ ' + url;
  } else {
    el.style.color = '#c62828';
    el.textContent = 'Not set — requests will fail on hosted sites.';
  }
}

function apiEndpoint() {
  const proxy = localStorage.getItem('tegrity_proxy_url');
  return (proxy || 'https://api.anthropic.com') + '/v1/messages';
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function newChat() {
  if (history.length && !confirm('Start a new chat? The current conversation will be cleared.')) return;
  history = [];
  document.getElementById('chatWrap').innerHTML = '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  if (busy) return;
  const key = localStorage.getItem('tegrity_chat_apikey');
  if (!key) { alert('Please enter and save your Anthropic API key first.'); return; }

  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  history.push({ role: 'user', content: text });
  appendBubble('user', 'You', text);

  busy = true;
  document.getElementById('btnSend').disabled = true;

  const thinkingEl = appendThinking();

  try {
    const resp = await fetch(apiEndpoint(), {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-allow-browser': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        messages: history,
      }),
    });

    thinkingEl.remove();

    if (!resp.ok) {
      let msg = resp.statusText;
      try { const e = await resp.json(); msg = e.error?.message || msg; } catch {}
      throw new Error('API ' + resp.status + ': ' + msg);
    }

    const data  = await resp.json();
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    appendBubble('claude', 'Claude', reply);

  } catch (e) {
    thinkingEl.remove();
    history.pop();   // remove the user message we added
    appendError(e.message);
  }

  busy = false;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('msgInput').focus();
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function appendBubble(role, name, text) {
  const wrap = document.getElementById('chatWrap');
  const block = document.createElement('div');
  block.className = 'msg-block ' + role;

  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name';
  nameEl.textContent = name;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  block.appendChild(nameEl);
  block.appendChild(bubble);
  wrap.appendChild(block);
  wrap.scrollTop = wrap.scrollHeight;
  return block;
}

function appendThinking() {
  const wrap = document.getElementById('chatWrap');
  const el   = document.createElement('div');
  el.className  = 'thinking';
  el.textContent = 'Claude is thinking…';
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
  return el;
}

function appendError(msg) {
  const wrap = document.getElementById('chatWrap');
  const el   = document.createElement('div');
  el.style.cssText = 'background:#fdecea;border:1px solid #f5c6c2;color:#c62828;' +
                     'border-radius:4px;padding:10px 14px;font-size:13px;max-width:680px;';
  el.textContent = 'Error: ' + msg;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
refreshKeyNote();
refreshProxyNote();
</script>
</body>
</html>
